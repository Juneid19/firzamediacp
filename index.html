<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firza Radio - Modern Vinyl Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --neon-color: #00f5ff;
            --neon-color2: #ff00ff;
            --neon-color3: #ffff00;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Rajdhani', sans-serif;
            /* Background akan di-set via JavaScript */
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            /* Smooth transition untuk background */
            transition: background 1.5s ease;
        }

        #particles-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .player-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 360px;
            background: linear-gradient(145deg, rgba(20, 20, 30, 0.9), rgba(10, 10, 15, 0.95));
            border-radius: 25px;
            padding: 20px;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.8),
                0 0 0 1px rgba(255, 255, 255, 0.1),
                inset 0 1px 0 rgba(255, 255, 255, 0.1),
                0 0 80px var(--neon-color, #00f5ff);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: box-shadow 1.5s ease;
        }

        .player-header {
            text-align: center;
            margin-bottom: 15px;
        }

        .radio-brand {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--neon-color);
            letter-spacing: 3px;
            text-shadow: 
                0 0 10px var(--neon-color),
                0 0 20px var(--neon-color),
                0 0 40px var(--neon-color);
            animation: titleGlow 2s ease-in-out infinite alternate;
            transition: color 1.5s ease, text-shadow 1.5s ease;
        }

        @keyframes titleGlow {
            from { filter: brightness(1); }
            to { filter: brightness(1.3); }
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 8px;
            padding: 4px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            border: 1px solid var(--neon-color);
            transition: border-color 1.5s ease;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #666;
        }

        .status-dot.connected {
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            animation: pulse 1.5s ease infinite;
        }

        .status-dot.connecting {
            background: #ffaa00;
            animation: blink 1s ease infinite;
        }

        .status-dot.error {
            background: #ff3366;
            box-shadow: 0 0 10px #ff3366;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .status-text {
            font-size: 0.7rem;
            font-family: 'Orbitron', sans-serif;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        /* ===== VINYL SECTION ===== */
        .vinyl-section {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            margin: 10px auto;
            display: flex;
            justify-content: center;
            align-items: center;
            max-width: 280px;
        }

        .neon-ring {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            pointer-events: none;
            border: 2px solid var(--neon-color);
            box-shadow: 
                0 0 15px var(--neon-color),
                0 0 30px var(--neon-color),
                inset 0 0 15px var(--neon-color);
            animation: neonPulse 2s ease-in-out infinite;
            transition: border-color 1.5s ease, box-shadow 1.5s ease;
        }

        @keyframes neonPulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        .glow-layer {
            position: absolute;
            width: 115%;
            height: 115%;
            top: -7.5%;
            left: -7.5%;
            border-radius: 50%;
            background: conic-gradient(
                from 0deg,
                transparent,
                var(--neon-color),
                transparent 120deg,
                var(--neon-color2),
                transparent 240deg,
                var(--neon-color3),
                transparent
            );
            opacity: 0.25;
            filter: blur(25px);
            animation: rotateGlow 10s linear infinite;
            pointer-events: none;
            transition: background 1.5s ease;
        }

        @keyframes rotateGlow {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .turntable {
            position: relative;
            width: 92%;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #1a1a25, #0d0d12);
            border-radius: 50%;
            box-shadow: 
                0 8px 30px rgba(0, 0, 0, 0.6),
                inset 0 2px 4px rgba(255, 255, 255, 0.05),
                0 0 40px var(--neon-color);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
            transition: box-shadow 1.5s ease;
        }

        /* ===== VINYL DISC - ISOLATED & SMOOTH ===== */
        .vinyl-disc {
            position: relative;
            width: 92%;
            aspect-ratio: 1;
            border-radius: 50%;
            background: 
                repeating-radial-gradient(
                    circle at center,
                    #151515 0px,
                    #151515 1px,
                    #0a0a0a 1px,
                    #0a0a0a 3px
                );
            box-shadow: 
                0 4px 20px rgba(0, 0, 0, 0.5),
                inset 0 0 40px rgba(0, 0, 0, 0.8);
            
            /* ===== CRITICAL: SMOOTH SPIN ===== */
            will-change: transform;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
            transform: rotate(0deg);
        }

        .vinyl-disc.spinning {
            animation: vinylSpin 4s linear infinite;
        }

        @keyframes vinylSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .vinyl-disc::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 72%;
            height: 72%;
            border-radius: 50%;
            background: linear-gradient(145deg, #222230, #15151a);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            aspect-ratio: 1;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(145deg, #333, #222);
            box-shadow: 
                0 0 25px rgba(0, 0, 0, 0.6),
                inset 0 0 15px rgba(0, 0, 0, 0.3),
                0 0 30px var(--neon-color);
            border: 3px solid rgba(255, 255, 255, 0.15);
            transition: box-shadow 1.5s ease;
        }

        .vinyl-label img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 1;
            transition: opacity 0.5s ease;
        }

        .vinyl-spindle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5%;
            aspect-ratio: 1;
            background: linear-gradient(145deg, #555, #333);
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            z-index: 5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .vinyl-shine {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.08) 0%,
                transparent 50%,
                rgba(0, 0, 0, 0.15) 100%
            );
            pointer-events: none;
        }

        /* ===== TONEARM ===== */
        .tonearm-container {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 50%;
            z-index: 20;
            pointer-events: none;
        }

        .tonearm {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 100%;
            height: 100%;
            transform-origin: calc(100% - 12px) 12px;
            transform: rotate(15deg);
            transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tonearm.playing {
            transform: rotate(-55deg);
        }

        .tonearm-base {
            position: absolute;
            top: 0;
            right: 0;
            width: 24px;
            height: 24px;
            background: linear-gradient(145deg, #666, #444);
            border-radius: 50%;
            box-shadow: 
                0 3px 12px rgba(0, 0, 0, 0.5),
                inset 0 1px 2px rgba(255, 255, 255, 0.3);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tonearm-arm {
            position: absolute;
            top: 10px;
            right: 20px;
            width: 75%;
            height: 5px;
            background: linear-gradient(180deg, #777, #444, #555);
            border-radius: 2px;
            transform-origin: right center;
            transform: rotate(50deg);
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.4);
        }

        .tonearm-arm::before {
            content: '';
            position: absolute;
            left: -3px;
            top: 50%;
            transform: translateY(-50%);
            width: 16px;
            height: 10px;
            background: linear-gradient(180deg, #888, #555);
            border-radius: 2px;
        }

        .tonearm-head {
            position: absolute;
            left: -20px;
            top: 50%;
            transform: translateY(-50%) rotate(-15deg);
            width: 22px;
            height: 12px;
            background: linear-gradient(180deg, #999, #666);
            border-radius: 2px 6px 6px 2px;
        }

        .tonearm-head::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 8px;
            background: var(--neon-color);
            border-radius: 1px;
            box-shadow: 0 0 8px var(--neon-color), 0 0 15px var(--neon-color);
            transition: background 1.5s ease, box-shadow 1.5s ease;
        }

        .song-info {
            margin: 12px 0;
            text-align: center;
        }

        .now-playing-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.6rem;
            color: var(--neon-color);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 6px;
            opacity: 0.7;
            transition: color 1.5s ease;
        }

        .song-title-container {
            width: 100%;
            overflow: hidden;
            padding: 6px 0;
            position: relative;
            mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
            -webkit-mask-image: linear-gradient(90deg, transparent, black 10%, black 90%, transparent);
        }

        .song-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            display: inline-block;
            text-shadow: 0 0 15px var(--neon-color);
            transition: text-shadow 1.5s ease;
        }

        .song-title.scrolling {
            animation: marquee 10s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }

        .song-artist {
            font-size: 0.85rem;
            color: var(--neon-color2);
            margin-top: 4px;
            font-weight: 500;
            text-shadow: 0 0 12px var(--neon-color2);
            transition: color 1.5s ease, text-shadow 1.5s ease;
        }

        .equalizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 3px;
            height: 25px;
            margin-top: 10px;
        }

        .eq-bar {
            width: 3px;
            background: linear-gradient(180deg, var(--neon-color), var(--neon-color2));
            border-radius: 2px;
            height: 4px;
            box-shadow: 0 0 6px var(--neon-color);
            transition: background 1.5s ease, box-shadow 1.5s ease;
        }

        .eq-bar.active {
            animation-duration: 0.4s;
            animation-timing-function: ease-in-out;
            animation-iteration-count: infinite;
        }

        .eq-bar:nth-child(1).active { animation-name: eq1; }
        .eq-bar:nth-child(2).active { animation-name: eq2; }
        .eq-bar:nth-child(3).active { animation-name: eq3; }
        .eq-bar:nth-child(4).active { animation-name: eq4; }
        .eq-bar:nth-child(5).active { animation-name: eq5; }
        .eq-bar:nth-child(6).active { animation-name: eq6; }
        .eq-bar:nth-child(7).active { animation-name: eq7; }

        @keyframes eq1 { 0%, 100% { height: 6px; } 50% { height: 22px; } }
        @keyframes eq2 { 0%, 100% { height: 10px; } 50% { height: 18px; } }
        @keyframes eq3 { 0%, 100% { height: 4px; } 50% { height: 25px; } }
        @keyframes eq4 { 0%, 100% { height: 14px; } 50% { height: 20px; } }
        @keyframes eq5 { 0%, 100% { height: 8px; } 50% { height: 23px; } }
        @keyframes eq6 { 0%, 100% { height: 12px; } 50% { height: 16px; } }
        @keyframes eq7 { 0%, 100% { height: 5px; } 50% { height: 21px; } }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin: 15px 0;
        }

        .control-btn {
            background: none;
            border: none;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.2rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .control-btn:hover {
            color: var(--neon-color);
            transform: scale(1.1);
        }

        .play-btn {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--neon-color);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 
                0 0 25px var(--neon-color),
                inset 0 0 25px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transition: border-color 1.5s ease, box-shadow 1.5s ease, transform 0.3s ease;
        }

        .play-btn:hover {
            transform: scale(1.05);
        }

        .play-btn i {
            font-size: 1.6rem;
            color: var(--neon-color);
            z-index: 1;
            margin-left: 3px;
            transition: color 1.5s ease;
        }

        .play-btn.playing i {
            margin-left: 0;
        }

        .play-btn.playing {
            animation: glowPulse 2s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0%, 100% { box-shadow: 0 0 25px var(--neon-color), inset 0 0 25px rgba(0, 0, 0, 0.5); }
            50% { box-shadow: 0 0 40px var(--neon-color), 0 0 60px var(--neon-color2), inset 0 0 30px rgba(0, 0, 0, 0.5); }
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid var(--neon-color);
            transition: border-color 1.5s ease;
        }

        .volume-icon {
            color: var(--neon-color);
            font-size: 1rem;
            width: 20px;
            text-align: center;
            cursor: pointer;
            transition: color 1.5s ease, transform 0.3s ease;
        }

        .volume-icon:hover {
            transform: scale(1.1);
        }

        .volume-slider {
            flex: 1;
            height: 5px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: var(--neon-color);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px var(--neon-color);
        }

        .volume-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background: var(--neon-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .volume-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon-color);
            min-width: 35px;
            text-align: right;
            transition: color 1.5s ease;
        }

        .player-footer {
            text-align: center;
            margin-top: 12px;
            padding-top: 10px;
            border-top: 1px solid var(--neon-color);
            transition: border-color 1.5s ease;
        }

        .footer-text {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 1px;
        }

        .track-history {
            margin-top: 10px;
            padding: 0 8px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease, padding 0.3s ease;
        }

        .track-history.show {
            max-height: 150px;
            padding: 8px;
        }

        .track-history-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.55rem;
            color: var(--neon-color);
            letter-spacing: 2px;
            margin-bottom: 6px;
            opacity: 0.7;
            transition: color 1.5s ease;
        }

        .track-history-list {
            list-style: none;
            max-height: 100px;
            overflow-y: auto;
        }

        .track-history-list li {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.4);
            padding: 3px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 10, 15, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 25px;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .loading-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--neon-color);
            border-radius: 50%;
            animation: spinLoader 1s linear infinite;
        }

        @keyframes spinLoader {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: var(--neon-color);
            letter-spacing: 2px;
        }

        .toast {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(0, 0, 0, 0.9);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 0.8rem;
            z-index: 1000;
            border: 1px solid var(--neon-color);
            box-shadow: 0 0 15px var(--neon-color);
            max-width: 90%;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            border-color: #ff3366;
        }

        @media (max-width: 380px) {
            .player-container { padding: 15px; border-radius: 20px; }
            .radio-brand { font-size: 1.3rem; }
            .vinyl-section { max-width: 240px; }
            .play-btn { width: 60px; height: 60px; }
            .play-btn i { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="player-container">
        <div class="loading-overlay" id="loading-overlay">
            <div class="loading-spinner"></div>
            <div class="loading-text">CONNECTING...</div>
        </div>

        <div class="player-header">
            <h1 class="radio-brand">FIRZA RADIO</h1>
            <div class="status-indicator">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">Ready</span>
            </div>
        </div>

        <div class="vinyl-section">
            <div class="glow-layer"></div>
            <div class="neon-ring"></div>
            
            <div class="turntable">
                <div class="vinyl-disc" id="vinyl-disc">
                    <div class="vinyl-label">
                        <img src="https://frpadang.netlify.app/img/default.jpg" alt="Cover" id="cover-art">
                    </div>
                    <div class="vinyl-spindle"></div>
                    <div class="vinyl-shine"></div>
                </div>
            </div>
            <div class="tonearm-container">
                <div class="tonearm" id="tonearm">
                    <div class="tonearm-base"></div>
                    <div class="tonearm-arm">
                        <div class="tonearm-head"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="song-info">
            <div class="now-playing-label">NOW PLAYING</div>
            <div class="song-title-container">
                <div class="song-title" id="song-title">Firza Radio</div>
            </div>
            <div class="song-artist" id="song-artist">Klik Play untuk Memulai</div>
            
            <div class="equalizer" id="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>

            <div class="track-history" id="track-history">
                <div class="track-history-title">RECENTLY PLAYED</div>
                <ul class="track-history-list" id="history-list"></ul>
            </div>
        </div>

        <div class="controls">
            <button class="control-btn" id="history-btn" title="History">
                <i class="fas fa-clock-rotate-left"></i>
            </button>
            <button class="play-btn" id="play-btn" title="Play/Pause">
                <i class="fas fa-play" id="play-icon"></i>
            </button>
            <button class="control-btn" id="refresh-btn" title="Refresh">
                <i class="fas fa-rotate"></i>
            </button>
        </div>

        <div class="volume-control">
            <i class="fas fa-volume-high volume-icon" id="volume-icon"></i>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="75">
            <span class="volume-value" id="volume-value">75%</span>
        </div>

        <div class="player-footer">
            <p class="footer-text">Firza Radio © 2025</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <audio id="audio-player" preload="none"></audio>

    <script>
        // ==================== CONFIGURATION ====================
        const CONFIG = {
            radioName: 'Firza Radio',
            streamUrl: 'https://mpc1.mediacp.eu/stream/firzaradio',
            apiUrl: 'https://mpc1.mediacp.eu:2000/json/stream/firzaradio',
            defaultCover: 'https://frpadang.netlify.app/img/default.jpg',
            updateInterval: 10000,
            colorChangeInterval: 15000,
            corsProxies: [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?'
            ]
        };

        // ==================== COLOR PRESETS ====================
        const backgrounds = [
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%)',
            'linear-gradient(135deg, #1a0a0a 0%, #2e0a1a 50%, #1a0a2e 100%)',
            'linear-gradient(135deg, #0a1a0a 0%, #0a2e1a 50%, #0a1a1a 100%)',
            'linear-gradient(135deg, #1a1a0a 0%, #2e2e0a 50%, #1a1a0a 100%)',
            'linear-gradient(135deg, #0a0a2e 0%, #1a0a3e 50%, #2e0a3e 100%)',
            'linear-gradient(135deg, #2e0a2e 0%, #3e0a2e 50%, #2e0a1a 100%)',
            'linear-gradient(135deg, #0a2e2e 0%, #0a3e3e 50%, #0a2e1a 100%)',
            'linear-gradient(135deg, #1a0a1a 0%, #2e1a2e 50%, #1a2e2e 100%)'
        ];

        const neonColors = [
            '#00f5ff', // Cyan
            '#ff00ff', // Magenta
            '#00ff88', // Green
            '#ffff00', // Yellow
            '#ff6600', // Orange
            '#ff0066', // Pink
            '#00ffff', // Aqua
            '#ff00aa'  // Purple Pink
        ];

        const neonColors2 = [
            '#ff00ff', '#00f5ff', '#ffff00', '#ff6600', 
            '#00ff88', '#ff00aa', '#ff0066', '#00ffff'
        ];

        const neonColors3 = [
            '#ffff00', '#00ff88', '#ff6600', '#00f5ff',
            '#ff00aa', '#ff0066', '#00ffff', '#ff00ff'
        ];

        // ==================== DOM ELEMENTS ====================
        const $ = id => document.getElementById(id);
        const audio = $('audio-player');
        const playBtn = $('play-btn');
        const playIcon = $('play-icon');
        const vinylDisc = $('vinyl-disc');
        const tonearm = $('tonearm');
        const coverArt = $('cover-art');
        const songTitle = $('song-title');
        const songArtist = $('song-artist');
        const volumeSlider = $('volume-slider');
        const volumeIcon = $('volume-icon');
        const volumeValue = $('volume-value');
        const loadingOverlay = $('loading-overlay');
        const statusDot = $('status-dot');
        const statusText = $('status-text');
        const toast = $('toast');
        const refreshBtn = $('refresh-btn');
        const historyBtn = $('history-btn');
        const trackHistory = $('track-history');
        const historyList = $('history-list');

        // ==================== STATE ====================
        let state = {
            isPlaying: false,
            currentSong: '',
            currentCover: '',
            volume: 0.75,
            isMuted: false,
            prevVolume: 0.75,
            metadataInterval: null,
            colorInterval: null,
            colorIndex: 0,
            particles: []
        };

        // ==================== BACKGROUND FUNCTIONS ====================
        function changeBG(seed) {
            // Generate index based on song name
            const x = Math.abs(seed.split('').reduce((a, c) => a + c.charCodeAt(0), 0));
            const idx = x % backgrounds.length;
            
            document.body.style.background = backgrounds[idx];
            document.documentElement.style.setProperty('--neon-color', neonColors[idx]);
            document.documentElement.style.setProperty('--neon-color2', neonColors2[idx]);
            document.documentElement.style.setProperty('--neon-color3', neonColors3[idx]);
            
            console.log(`🎨 BG changed: ${idx}`);
        }

        function cycleBG() {
            state.colorIndex = (state.colorIndex + 1) % backgrounds.length;
            
            document.body.style.background = backgrounds[state.colorIndex];
            document.documentElement.style.setProperty('--neon-color', neonColors[state.colorIndex]);
            document.documentElement.style.setProperty('--neon-color2', neonColors2[state.colorIndex]);
            document.documentElement.style.setProperty('--neon-color3', neonColors3[state.colorIndex]);
            
            console.log(`🎨 BG cycled: ${state.colorIndex}`);
        }

        function startColorCycle() {
            if (state.colorInterval) clearInterval(state.colorInterval);
            state.colorInterval = setInterval(() => {
                if (state.isPlaying) cycleBG();
            }, CONFIG.colorChangeInterval);
        }

        function stopColorCycle() {
            if (state.colorInterval) {
                clearInterval(state.colorInterval);
                state.colorInterval = null;
            }
        }

        // ==================== PARTICLES ====================
        function createParticles() {
            const canvas = $('particles-canvas');
            const ctx = canvas.getContext('2d');

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            const count = Math.min(50, Math.floor((canvas.width * canvas.height) / 30000));
            
            for (let i = 0; i < count; i++) {
                state.particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speedX: (Math.random() - 0.5) * 0.3,
                    speedY: (Math.random() - 0.5) * 0.3,
                    opacity: Math.random() * 0.4 + 0.1
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                
                // Get current neon color
                const neonColor = getComputedStyle(document.documentElement).getPropertyValue('--neon-color').trim() || '#00f5ff';
                
                state.particles.forEach(p => {
                    p.x += p.speedX;
                    p.y += p.speedY;
                    if (p.x < 0 || p.x > canvas.width) p.speedX *= -1;
                    if (p.y < 0 || p.y > canvas.height) p.speedY *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = neonColor.replace(')', `, ${p.opacity})`).replace('rgb', 'rgba').replace('#', '');
                    
                    // Convert hex to rgba
                    const hex = neonColor.replace('#', '');
                    const r = parseInt(hex.substring(0, 2), 16);
                    const g = parseInt(hex.substring(2, 4), 16);
                    const b = parseInt(hex.substring(4, 6), 16);
                    ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${p.opacity})`;
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = neonColor;
                    ctx.fill();
                });

                // Draw connections
                ctx.shadowBlur = 0;
                for (let i = 0; i < state.particles.length; i++) {
                    for (let j = i + 1; j < state.particles.length; j++) {
                        const dx = state.particles[i].x - state.particles[j].x;
                        const dy = state.particles[i].y - state.particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 100) {
                            const hex = neonColor.replace('#', '');
                            const r = parseInt(hex.substring(0, 2), 16);
                            const g = parseInt(hex.substring(2, 4), 16);
                            const b = parseInt(hex.substring(4, 6), 16);
                            ctx.beginPath();
                            ctx.moveTo(state.particles[i].x, state.particles[i].y);
                            ctx.lineTo(state.particles[j].x, state.particles[j].y);
                            ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${0.1 * (1 - dist / 100)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                requestAnimationFrame(animate);
            }
            animate();
        }

        // ==================== UTILITY FUNCTIONS ====================
        function log(msg) { console.log(`[Firza Radio] ${msg}`); }

        function showToast(message, isError = false) {
            toast.textContent = message;
            toast.className = 'toast show' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 3000);
        }

        function setStatus(type, text) {
            statusDot.className = 'status-dot ' + type;
            statusText.textContent = text;
        }

        // ==================== API FUNCTIONS ====================
        async function fetchMetadata() {
            try {
                const response = await fetch(CONFIG.apiUrl);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                if (data && data.status === true) {
                    return {
                        nowplaying: data.nowplaying || '',
                        coverart: data.coverart || '',
                        trackhistory: data.trackhistory || []
                    };
                }
                return null;
            } catch (e) {
                return null;
            }
        }

        async function searchCoverFromiTunes(query) {
            if (!query || query.length < 3) return null;
            try {
                const cleanQuery = query.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/feat\..*/i, '').replace(/ft\..*/i, '').replace(/&/g, 'and').trim();
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(cleanQuery)}&media=music&limit=5`);
                const data = await response.json();
                if (data.results && data.results.length > 0 && data.results[0].artworkUrl100) {
                    return data.results[0].artworkUrl100.replace('100x100', '600x600');
                }
            } catch (e) {}
            return null;
        }

        async function searchCoverFromDeezer(query) {
            if (!query || query.length < 3) return null;
            const cleanQuery = query.replace(/\[.*?\]/g, '').replace(/\(.*?\)/g, '').replace(/feat\..*/i, '').replace(/ft\..*/i, '').replace(/&/g, 'and').trim();
            for (const proxy of CONFIG.corsProxies) {
                try {
                    const response = await fetch(proxy + encodeURIComponent(`https://api.deezer.com/search?q=${encodeURIComponent(cleanQuery)}&limit=5`));
                    const data = JSON.parse(await response.text());
                    if (data.data && data.data.length > 0 && data.data[0].album && data.data[0].album.cover_big) {
                        return data.data[0].album.cover_big;
                    }
                } catch (e) {}
            }
            return null;
        }

        function testImageLoad(url) {
            return new Promise(resolve => {
                const img = new Image();
                img.onload = () => resolve(true);
                img.onerror = () => resolve(false);
                img.src = url;
            });
        }

        function updateTrackHistory(history) {
            if (!history || !history.length) return;
            historyList.innerHTML = '';
            history.slice(0, 5).forEach(track => {
                const li = document.createElement('li');
                li.textContent = track;
                historyList.appendChild(li);
            });
        }

        // ==================== NOW PLAYING ====================
        async function fetchNowPlaying(forceUpdate = false) {
            const data = await fetchMetadata();
            if (!data || !data.nowplaying) return;
            
            if (data.trackhistory) updateTrackHistory(data.trackhistory);
            if (data.nowplaying === state.currentSong && !forceUpdate) return;
            
            state.currentSong = data.nowplaying;
            log(`🎵 ${data.nowplaying}`);
            
            // Parse artist & title
            let artist = CONFIG.radioName, title = data.nowplaying;
            if (data.nowplaying.includes(' - ')) {
                const parts = data.nowplaying.split(' - ');
                artist = parts[0].trim();
                title = parts.slice(1).join(' - ').trim();
            }
            
            songTitle.textContent = title;
            songArtist.textContent = artist;
            
            // Marquee check
            songTitle.classList.remove('scrolling');
            requestAnimationFrame(() => {
                if (songTitle.scrollWidth > songTitle.parentElement.offsetWidth) {
                    songTitle.classList.add('scrolling');
                }
            });
            
            // Change background based on song name
            changeBG(data.nowplaying);
            
            // Cover art
            let coverUrl = null;
            if (data.coverart && await testImageLoad(data.coverart)) {
                coverUrl = data.coverart;
            } else {
                coverUrl = await searchCoverFromiTunes(data.nowplaying) || await searchCoverFromDeezer(data.nowplaying) || CONFIG.defaultCover;
            }
            
            if (coverUrl !== state.currentCover) {
                state.currentCover = coverUrl;
                coverArt.style.opacity = '0';
                setTimeout(() => {
                    coverArt.src = coverUrl;
                    coverArt.onload = () => coverArt.style.opacity = '1';
                    coverArt.onerror = () => { coverArt.src = CONFIG.defaultCover; coverArt.style.opacity = '1'; };
                }, 300);
            }
            
            setStatus('connected', 'On Air');
            showToast(`🎵 ${title}`);
            
            // Media Session
            if ('mediaSession' in navigator) {
                navigator.mediaSession.metadata = new MediaMetadata({
                    title, artist, album: CONFIG.radioName,
                    artwork: [{ src: coverUrl || CONFIG.defaultCover, sizes: '512x512', type: 'image/jpeg' }]
                });
            }
        }

        // ==================== PLAYBACK CONTROLS ====================
        async function playStream() {
            loadingOverlay.classList.add('active');
            setStatus('connecting', 'Connecting...');
            
            try {
                audio.src = CONFIG.streamUrl;
                audio.volume = state.volume;
                await audio.play();
                
                state.isPlaying = true;
                playIcon.className = 'fas fa-pause';
                playBtn.classList.add('playing');
                vinylDisc.classList.add('spinning');
                tonearm.classList.add('playing');
                
                document.querySelectorAll('.eq-bar').forEach(bar => bar.classList.add('active'));
                
                setStatus('connected', 'On Air');
                showToast('▶️ Playing');
                
                // Start color cycle
                startColorCycle();
                
                // Fetch now playing
                await fetchNowPlaying(true);
                state.metadataInterval = setInterval(fetchNowPlaying, CONFIG.updateInterval);
            } catch (e) {
                showToast('Failed to play', true);
                setStatus('error', 'Error');
            }
            
            loadingOverlay.classList.remove('active');
        }

        function pauseStream() {
            audio.pause();
            audio.src = '';
            
            state.isPlaying = false;
            playIcon.className = 'fas fa-play';
            playBtn.classList.remove('playing');
            vinylDisc.classList.remove('spinning');
            tonearm.classList.remove('playing');
            
            document.querySelectorAll('.eq-bar').forEach(bar => bar.classList.remove('active'));
            
            if (state.metadataInterval) { clearInterval(state.metadataInterval); state.metadataInterval = null; }
            stopColorCycle();
            
            setStatus('', 'Paused');
            showToast('⏸️ Paused');
        }

        function togglePlay() { state.isPlaying ? pauseStream() : playStream(); }

        // ==================== VOLUME CONTROLS ====================
        function updateVolume(value) {
            state.volume = value / 100;
            audio.volume = state.volume;
            volumeValue.textContent = value + '%';
            
            const icons = ['fa-volume-xmark', 'fa-volume-off', 'fa-volume-low', 'fa-volume-high'];
            volumeIcon.className = `fas ${icons[value == 0 ? 0 : value < 30 ? 1 : value < 70 ? 2 : 3]} volume-icon`;
            state.isMuted = value == 0;
            
            // Update slider gradient
            const neonColor = getComputedStyle(document.documentElement).getPropertyValue('--neon-color').trim();
            volumeSlider.style.background = `linear-gradient(to right, ${neonColor} ${value}%, rgba(255,255,255,0.1) ${value}%)`;
        }

        function toggleMute() {
            if (state.isMuted || state.volume === 0) {
                volumeSlider.value = state.prevVolume > 0 ? state.prevVolume * 100 : 75;
                updateVolume(volumeSlider.value);
            } else {
                state.prevVolume = state.volume;
                volumeSlider.value = 0;
                updateVolume(0);
            }
        }

        // ==================== EVENT LISTENERS ====================
        function initEvents() {
            playBtn.addEventListener('click', togglePlay);
            volumeSlider.addEventListener('input', e => updateVolume(e.target.value));
            volumeIcon.addEventListener('click', toggleMute);
            
            refreshBtn.addEventListener('click', async () => {
                refreshBtn.querySelector('i').classList.add('fa-spin');
                state.currentSong = '';
                await fetchNowPlaying(true);
                setTimeout(() => refreshBtn.querySelector('i').classList.remove('fa-spin'), 500);
            });
            
            historyBtn.addEventListener('click', () => trackHistory.classList.toggle('show'));
            
            audio.addEventListener('error', () => {
                showToast('Stream error', true);
                setStatus('error', 'Error');
                if (state.isPlaying) setTimeout(playStream, 5000);
            });
            audio.addEventListener('waiting', () => setStatus('connecting', 'Buffering...'));
            audio.addEventListener('playing', () => setStatus('connected', 'On Air'));
            
            document.addEventListener('keydown', e => {
                if (e.target.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
                else if (e.code === 'ArrowUp') { e.preventDefault(); volumeSlider.value = Math.min(100, +volumeSlider.value + 5); updateVolume(volumeSlider.value); }
                else if (e.code === 'ArrowDown') { e.preventDefault(); volumeSlider.value = Math.max(0, +volumeSlider.value - 5); updateVolume(volumeSlider.value); }
                else if (e.code === 'KeyM') toggleMute();
                else if (e.code === 'KeyC') cycleBG(); // Manual color change
            });
            
            coverArt.addEventListener('error', () => coverArt.src = CONFIG.defaultCover);
            
            if ('mediaSession' in navigator) {
                navigator.mediaSession.setActionHandler('play', playStream);
                navigator.mediaSession.setActionHandler('pause', pauseStream);
            }
        }

        // ==================== INIT ====================
        function init() {
            console.log('🎵 Firza Radio v4.0');
            console.log('💿 Smooth Vinyl + Simple BG System');
            console.log('⌨️ Press C to change colors');
            
            // Create particles
            createParticles();
            
            // Set initial background
            changeBG('FIRZA RADIO');
            
            // Init volume
            updateVolume(75);
            
            // Init events
            initEvents();
        }

        document.addEventListener('DOMContentLoaded', init);
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && state.isPlaying) fetchNowPlaying();
        });
    </script>
</body>
</html>
